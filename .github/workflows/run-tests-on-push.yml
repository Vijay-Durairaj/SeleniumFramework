# .github/workflows/run-tests-on-push.yml
name: Run Selenium Tests on Push

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-test:
    name: Run web automation suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PLATFORM: web
      RUN_REMOTE: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ── Chrome setup ─────────────────────────────────────────────────────────
      # ubuntu-latest ships with Google Chrome pre-installed.
      # We install the matching ChromeDriver via WebDriverManager in DriverFactory,
      # so we do NOT need browser-actions/setup-chrome — it causes path conflicts.
      - name: Verify Chrome installation
        run: |
          google-chrome --version
          which google-chrome
          echo "CHROME_PATH=$(which google-chrome)" >> $GITHUB_ENV

      # ── Run tests ─────────────────────────────────────────────────────────────
      - name: Run TestNG Selenium tests
        run: |
          mvn -B -e clean test \
            -Dplatform=${PLATFORM} \
            -Drun.remote=${RUN_REMOTE}
        env:
          CI: "true"
          # Pass CHROME_PATH so DriverFactory can set the binary location
          CHROME_PATH: ${{ env.CHROME_PATH }}
          # Uncomment below if your app needs real credentials stored as secrets:
          # LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
          # LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      # ── Debug output on failure ───────────────────────────────────────────────
      - name: Print surefire failures in logs
        if: failure()
        run: |
          echo "===== Surefire reports ====="
          if [ -d target/surefire-reports ]; then
            ls -la target/surefire-reports
            for f in target/surefire-reports/*.txt target/surefire-reports/*.xml; do
              [ -f "$f" ] || continue
              echo "----- $f -----"
              tail -n 200 "$f"
            done
          else
            echo "No surefire-reports directory found."
          fi

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-artifacts
          path: |
            target/surefire-reports/
            target/cucumber-reports.html
            target/extent-reports/
          if-no-files-found: ignore