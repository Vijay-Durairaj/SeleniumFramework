name: Run Selenium Tests on Push

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-test:
    name: Run web automation suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PLATFORM: web
      RUN_REMOTE: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show tool versions
        run: |
          java -version
          mvn -version
          google-chrome --version || chrome --version || true

      - name: Run TestNG Selenium tests
        run: |
          xvfb-run --auto-servernum mvn -B clean test -Dplatform=${PLATFORM} -Drun.remote=${RUN_REMOTE} -Dsurefire.printSummary=true -DtrimStackTrace=false

      - name: Print surefire failures in logs
        if: failure()
        run: |
          echo "===== Surefire reports ====="
          if [ -d target/surefire-reports ]; then
            ls -la target/surefire-reports
            for f in target/surefire-reports/*.txt target/surefire-reports/*.xml; do
              [ -f "$f" ] || continue
              echo "----- $f -----"
              tail -n 200 "$f"
            done
          else
            echo "No surefire-reports directory found."
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-artifacts
          path: |
            target/
          if-no-files-found: ignore

